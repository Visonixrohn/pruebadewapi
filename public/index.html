<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#00A884"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="RoaPanel"/>
  <title>RoaBusiness – Panel</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/icons/icon.svg"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <style>
    :root {
      --bg:#111B21; --surface:#1F2C34; --surface2:#2A3942;
      --sent:#005C4B; --recv:#1F2C34;
      --accent:#00A884; --accent2:#00CF9D;
      --text:#E9EDEF; --text2:#8696A0;
      --divider:#2A3942;
      --danger:#F15C6D; --warn:#FFB020; --ok:#00A884;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:15px}
    #app{display:flex;flex-direction:column;height:100dvh}
    .screen{display:none;flex-direction:column;height:100%;flex:1}
    .screen.active{display:flex}

    /* TOP BAR */
    .topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface2);min-height:58px;position:relative;z-index:10}
    .topbar .back-btn{background:none;border:none;color:var(--accent);font-size:26px;cursor:pointer;padding:4px 8px 4px 0;line-height:1}
    .topbar .avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
    .topbar .info{flex:1;min-width:0}
    .topbar .info .name{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .topbar .info .sub{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .topbar .actions{display:flex;gap:4px}
    .topbar .icon-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:8px;border-radius:50%;transition:background .2s}
    .topbar .icon-btn:active{background:var(--surface)}

    /* SEARCH */
    .search-bar{padding:8px 16px;background:var(--surface);display:flex;align-items:center}
    .search-bar input{flex:1;background:var(--surface2);border:none;border-radius:20px;padding:9px 16px;color:var(--text);font-size:14px;outline:none}
    .search-bar input::placeholder{color:var(--text2)}

    /* FILTER TABS */
    .filter-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--divider);overflow-x:auto;scrollbar-width:none}
    .filter-tabs::-webkit-scrollbar{display:none}
    .filter-tab{flex-shrink:0;padding:10px 16px;background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s}
    .filter-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .filter-tab .cnt{background:var(--accent);color:#fff;border-radius:10px;font-size:11px;font-weight:700;padding:1px 6px;margin-left:4px}

    /* LEAD LIST */
    #leads-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
    .lead-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--divider);transition:background .15s;-webkit-user-select:none;user-select:none}
    .lead-item:active{background:var(--surface2)}
    .lead-item .li-avatar{width:50px;height:50px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--text2);flex-shrink:0;position:relative}
    .lead-item .li-avatar .dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg)}
    .lead-item .li-body{flex:1;min-width:0}
    .lead-item .li-top{display:flex;justify-content:space-between;align-items:baseline;gap:4px}
    .lead-item .li-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .lead-item .li-time{font-size:11px;color:var(--text2);flex-shrink:0}
    .lead-item .li-bottom{display:flex;align-items:center;gap:4px;margin-top:3px}
    .lead-item .li-preview{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .li-unread{background:var(--accent);color:#fff;border-radius:10px;font-size:11px;font-weight:700;padding:1px 7px;flex-shrink:0}

    /* BADGES */
    .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px}
    .badge-new{background:#1A3C5C;color:#5DB8F5}
    .badge-waiting{background:#2C2415;color:var(--warn)}
    .badge-pending{background:#2C1A15;color:#FF8C5A}
    .badge-approval{background:#1C2F1C;color:var(--ok)}
    .badge-attended{background:#1A2E24;color:#4ADE80}
    .dot-new{background:#5DB8F5}
    .dot-waiting{background:var(--warn)}
    .dot-pending{background:#FF8C5A}
    .dot-approval{background:var(--ok)}
    .dot-attended{background:#4ADE80}

    /* EMPTY */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;color:var(--text2);text-align:center}
    .empty-state .es-icon{font-size:52px;opacity:.5}
    .empty-state p{font-size:14px;max-width:240px}

    /* CHAT */
    #chat-bg{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
    .msg-wrap{display:flex;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .msg-wrap.sent{justify-content:flex-end}
    .msg-wrap.recv{justify-content:flex-start}
    .msg-bubble{max-width:82%;padding:7px 10px 4px;border-radius:8px}
    .msg-wrap.sent .msg-bubble{background:var(--sent);border-bottom-right-radius:2px}
    .msg-wrap.recv .msg-bubble{background:var(--recv);border-bottom-left-radius:2px}
    .msg-text{font-size:14.5px;line-height:1.45;word-break:break-word;white-space:pre-wrap}
    .msg-meta{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px}
    .msg-time{font-size:11px;color:var(--text2)}
    .msg-media img{max-width:100%;border-radius:6px;cursor:pointer}
    .date-sep{text-align:center;margin:10px 0}
    .date-sep span{background:var(--surface2);padding:4px 14px;border-radius:10px;font-size:11px;color:var(--text2)}

    /* LEAD INFO */
    #lead-info-card{background:var(--surface);border-bottom:1px solid var(--divider);padding:10px 16px;display:flex;flex-direction:column;gap:8px}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .info-cell{font-size:12px}
    .info-cell .lbl{color:var(--text2);font-size:11px}
    .info-cell .val{color:var(--text);font-weight:500}
    .status-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .action-btn{flex:1;min-width:100px;border:none;border-radius:20px;padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:inherit}
    .action-btn:active{opacity:.7}
    .btn-approve{background:var(--accent);color:#fff}
    .btn-attend{background:var(--surface2);color:#4ADE80;border:1px solid #4ADE80}
    .btn-reopen{background:var(--surface2);color:var(--warn);border:1px solid var(--warn)}

    /* INPUT */
    #msg-input-bar{display:flex;align-items:flex-end;gap:8px;padding:8px 12px;background:var(--surface2)}
    #msg-input-bar textarea{flex:1;background:var(--surface);border:none;border-radius:20px;padding:10px 16px;color:var(--text);font-size:15px;resize:none;outline:none;max-height:120px;min-height:44px;line-height:1.4;font-family:inherit}
    #msg-input-bar textarea::placeholder{color:var(--text2)}
    #send-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
    #send-btn:active{opacity:.7}

    /* TOAST */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:999;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.4)}
    #toast.show{opacity:1}

    /* FAB */
    #fab-refresh{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s;z-index:100}
    #fab-refresh:active{transform:scale(.9)}
    #fab-refresh.spin{animation:spinit 1s linear infinite}
    @keyframes spinit{to{transform:rotate(360deg)}}

    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}
  </style>
</head>
<body>
<div id="app">

  <!-- ══ SCREEN: LISTA DE LEADS ══ -->
  <div id="screen-list" class="screen active">
    <div class="topbar">
      <div class="avatar">🤖</div>
      <div class="info">
        <div class="name">RoaBusiness Panel</div>
        <div class="sub" id="list-sub">Cargando…</div>
      </div>
      <div class="actions">
        <button class="icon-btn" onclick="refreshAll()">↻</button>
      </div>
    </div>
    <div class="search-bar">
      <input type="search" id="search-input" placeholder="Buscar por teléfono o negocio…" oninput="renderList()"/>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all',this)">Todos <span class="cnt" id="cnt-all">0</span></button>
      <button class="filter-tab" onclick="setFilter('pending_approval',this)">Aprobación <span class="cnt" id="cnt-pending_approval">0</span></button>
      <button class="filter-tab" onclick="setFilter('new_lead',this)">Nuevos <span class="cnt" id="cnt-new_lead">0</span></button>
      <button class="filter-tab" onclick="setFilter('waiting',this)">En proceso <span class="cnt" id="cnt-waiting">0</span></button>
      <button class="filter-tab" onclick="setFilter('attended',this)">Atendidos <span class="cnt" id="cnt-attended">0</span></button>
    </div>
    <div id="leads-list"></div>
  </div>

  <!-- ══ SCREEN: CHAT ══ -->
  <div id="screen-chat" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="goBack()">‹</button>
      <div id="chat-avatar" style="width:40px;height:40px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--text2);flex-shrink:0"></div>
      <div class="info">
        <div class="name" id="chat-name">—</div>
        <div class="sub" id="chat-sub">—</div>
      </div>
      <div class="actions">
        <button class="icon-btn" onclick="refreshChat()">↻</button>
      </div>
    </div>
    <div id="lead-info-card">
      <div class="info-grid" id="lead-fields"></div>
      <div class="status-bar" id="lead-actions"></div>
    </div>
    <div id="chat-bg"><div class="empty-state"><div class="es-icon">💬</div><p>Cargando mensajes…</p></div></div>
    <div id="msg-input-bar">
      <textarea id="msg-text" placeholder="Escribe un mensaje…" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>

</div>

<button id="fab-refresh" onclick="refreshAll()">↻</button>
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────
let leads=[], currentLead=null, currentFilter="all";
let refreshTimer=null, chatRefreshTimer=null;

// ── Toast ──────────────────────────────────────────────────
function toast(msg,ms=2500){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),ms);
}

// ── Formatters ─────────────────────────────────────────────
function fmtTime(ts){
  if(!ts)return"";
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString())
    return d.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
  const diff=Math.floor((now-d)/86400000);
  if(diff<7)return d.toLocaleDateString("es",{weekday:"short"});
  return d.toLocaleDateString("es",{day:"2-digit",month:"2-digit"});
}
function fmtDT(ts){
  if(!ts)return"";
  return new Date(ts).toLocaleString("es",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
}
function statusLabel(s){
  const m={new_lead:"Nuevo",waiting_intent:"Esperando",waiting_business_name:"Nombre negocio",
    waiting_contact_phone:"Teléfono",waiting_description:"Descripción",waiting_plan:"Plan",
    waiting_logo:"Logo",waiting_cover:"Portada",waiting_payment_proof:"Comprobante",
    waiting_confirmation:"Confirmación",pending_approval:"Pendiente aprobación",attended:"Atendido"};
  return m[s]||s||"—";
}
function sc(s){
  if(s==="attended")return"attended";
  if(s==="pending_approval")return"approval";
  if(s==="new_lead")return"new";
  if(s==="waiting_confirmation"||s==="waiting_payment_proof")return"pending";
  if(s&&s.startsWith("waiting"))return"waiting";
  return"new";
}
function avatarBg(s){
  return{new:"#1A3C5C",waiting:"#2C2415",pending:"#2C1A15",approval:"#1C2F1C",attended:"#1A2E24"}[sc(s)]||"#1F2C34";
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// ── Filters ────────────────────────────────────────────────
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll(".filter-tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active"); renderList();
}
function matchFilter(l){
  if(currentFilter==="all")return true;
  if(currentFilter==="attended")return l.bot_status==="attended";
  if(currentFilter==="pending_approval")return l.bot_status==="pending_approval";
  if(currentFilter==="new_lead")return l.bot_status==="new_lead";
  if(currentFilter==="waiting")return l.bot_status&&l.bot_status.startsWith("waiting");
  return true;
}
function updateCounts(){
  const c={all:leads.length,pending_approval:0,new_lead:0,waiting:0,attended:0};
  leads.forEach(l=>{
    if(l.bot_status==="pending_approval")c.pending_approval++;
    else if(l.bot_status==="new_lead")c.new_lead++;
    else if(l.bot_status==="attended")c.attended++;
    else if(l.bot_status&&l.bot_status.startsWith("waiting"))c.waiting++;
  });
  Object.keys(c).forEach(k=>{const e=document.getElementById("cnt-"+k);if(e)e.textContent=c[k]});
}

// ── Load leads ─────────────────────────────────────────────
async function loadLeads(){
  const fab=document.getElementById("fab-refresh");
  fab.classList.add("spin");
  try{
    const r=await fetch("/leads");
    if(!r.ok)throw new Error(r.status);
    leads=await r.json();
    updateCounts(); renderList();
    document.getElementById("list-sub").textContent=
      leads.length+" lead"+(leads.length!==1?"s":"")+" · "+
      new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
  }catch(e){toast("⚠ Error: "+e.message)}
  finally{fab.classList.remove("spin")}
}

// ── Render list ────────────────────────────────────────────
function renderList(){
  const q=(document.getElementById("search-input").value||"").toLowerCase();
  const items=leads.filter(l=>{
    if(!matchFilter(l))return false;
    if(!q)return true;
    return((l.user_phone||"")+(l.business_name||"")).toLowerCase().includes(q);
  });
  const c=document.getElementById("leads-list");
  if(!items.length){
    c.innerHTML='<div class="empty-state"><div class="es-icon">💬</div><p>No hay leads en este filtro</p></div>';
    return;
  }
  c.innerHTML=items.map(l=>{
    const name=l.business_name||l.user_phone||"Sin nombre";
    const init=l.business_name?l.business_name[0].toUpperCase():(l.user_phone||"?").replace(/\D/g,"").slice(-2,-1)||"?";
    const preview=l.business_description||statusLabel(l.bot_status);
    return`<div class="lead-item" onclick="openChat(${l.id})">
      <div class="li-avatar" style="background:${avatarBg(l.bot_status)}">
        ${esc(init)}<span class="dot dot-${sc(l.bot_status)}"></span>
      </div>
      <div class="li-body">
        <div class="li-top">
          <div class="li-name">${esc(name)}</div>
          <div class="li-time">${fmtTime(l.updated_at||l.created_at)}</div>
        </div>
        <div class="li-bottom">
          <div class="li-preview">${esc(l.user_phone||"")}</div>
          ${l.bot_status==="pending_approval"
            ?'<span class="li-unread">!</span>'
            :`<span class="badge badge-${sc(l.bot_status)}">${statusLabel(l.bot_status)}</span>`}
        </div>
      </div>
    </div>`;
  }).join("");
}

// ── Open chat ──────────────────────────────────────────────
async function openChat(id){
  currentLead=leads.find(l=>l.id===id);
  if(!currentLead)return;
  document.getElementById("screen-list").classList.remove("active");
  document.getElementById("screen-chat").classList.add("active");
  document.getElementById("fab-refresh").style.display="none";
  renderChatHeader(); renderLeadInfo();
  await loadMessages();
  clearInterval(chatRefreshTimer);
  chatRefreshTimer=setInterval(loadMessages,8000);
}

function goBack(){
  document.getElementById("screen-chat").classList.remove("active");
  document.getElementById("screen-list").classList.add("active");
  document.getElementById("fab-refresh").style.display="flex";
  clearInterval(chatRefreshTimer); currentLead=null;
}

function renderChatHeader(){
  const l=currentLead;
  const name=l.business_name||l.user_phone||"Lead";
  const init=l.business_name?l.business_name[0].toUpperCase():(l.user_phone||"?").replace(/\D/g,"").slice(-2,-1)||"?";
  const av=document.getElementById("chat-avatar");
  av.textContent=init; av.style.background=avatarBg(l.bot_status);
  document.getElementById("chat-name").textContent=name;
  document.getElementById("chat-sub").textContent=(l.user_phone||"")+" · "+statusLabel(l.bot_status);
}

function renderLeadInfo(){
  const l=currentLead;
  const fields=[
    {lbl:"Teléfono",val:l.user_phone},{lbl:"Plan",val:l.plan_elegido},
    {lbl:"Negocio",val:l.business_name},{lbl:"Contacto",val:l.contact_phone},
    {lbl:"Descripción",val:l.business_description},{lbl:"Estado",val:statusLabel(l.bot_status)},
    {lbl:"Creado",val:fmtDT(l.created_at)},{lbl:"Actualizado",val:fmtDT(l.updated_at)},
  ].filter(f=>f.val);
  let html=fields.map(f=>`<div class="info-cell"><div class="lbl">${f.lbl}</div><div class="val">${esc(f.val)}</div></div>`).join("");
  const imgs=[];
  if(l.logo_url)imgs.push(`<a href="${l.logo_url}" target="_blank" style="color:var(--accent);font-size:13px">🖼 Logo</a>`);
  if(l.cover_url)imgs.push(`<a href="${l.cover_url}" target="_blank" style="color:var(--accent);font-size:13px">🖼 Portada</a>`);
  if(l.payment_proof_url)imgs.push(`<a href="${l.payment_proof_url}" target="_blank" style="color:var(--accent);font-size:13px">🧾 Comprobante</a>`);
  if(imgs.length)html+=`<div class="info-cell" style="grid-column:1/-1">${imgs.join(" &nbsp; ")}</div>`;
  document.getElementById("lead-fields").innerHTML=html;

  const s=l.bot_status;
  let btns="";
  if(s==="pending_approval")btns+=`<button class="action-btn btn-approve" onclick="updateStatus('attended')">✅ Aprobar</button>`;
  if(s!=="attended")btns+=`<button class="action-btn btn-attend" onclick="updateStatus('attended')">☑ Atendido</button>`;
  if(s==="attended")btns+=`<button class="action-btn btn-reopen" onclick="updateStatus('new_lead')">↩ Reabrir</button>`;
  document.getElementById("lead-actions").innerHTML=btns;
}

// ── Messages ───────────────────────────────────────────────
async function loadMessages(){
  if(!currentLead)return;
  try{
    const r=await fetch(`/leads/${currentLead.id}/mensajes`);
    renderMessages(await r.json());
  }catch(e){console.error(e)}
}

function renderMessages(msgs){
  const c=document.getElementById("chat-bg");
  if(!msgs.length){
    c.innerHTML='<div class="empty-state"><div class="es-icon">💬</div><p>Sin mensajes aún</p></div>';
    return;
  }
  let html="",lastDate=null;
  msgs.forEach(m=>{
    const d=new Date(m.creado_en);
    const ds=d.toLocaleDateString("es",{weekday:"long",day:"numeric",month:"long"});
    if(ds!==lastDate){html+=`<div class="date-sep"><span>${ds}</span></div>`;lastDate=ds}
    const dir=m.direccion==="saliente"?"sent":"recv";
    const time=d.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
    const content=m.url_medio
      ?`<div class="msg-media"><img src="${m.url_medio}" alt="img" onclick="window.open('${m.url_medio}')"/></div>`
      :`<div class="msg-text">${esc(m.contenido||"")}</div>`;
    html+=`<div class="msg-wrap ${dir}"><div class="msg-bubble">${content}<div class="msg-meta"><span class="msg-time">${time}</span></div></div></div>`;
  });
  const atBottom=c.scrollTop+c.clientHeight>=c.scrollHeight-30;
  c.innerHTML=html;
  if(atBottom||msgs.length<6)c.scrollTop=c.scrollHeight;
}

// ── Update status ──────────────────────────────────────────
async function updateStatus(newStatus){
  if(!currentLead)return;
  try{
    const r=await fetch(`/leads/${currentLead.id}`,{
      method:"PATCH",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({bot_status:newStatus})
    });
    if(!r.ok)throw new Error(await r.text());
    const up=await r.json();
    currentLead={...currentLead,...up};
    const i=leads.findIndex(l=>l.id===currentLead.id);
    if(i!==-1)leads[i]=currentLead;
    renderChatHeader(); renderLeadInfo(); updateCounts(); renderList();
    toast("✅ Estado: "+statusLabel(newStatus));
  }catch(e){toast("⚠ "+e.message)}
}

// ── Send message ───────────────────────────────────────────
async function sendMsg(){
  if(!currentLead)return;
  const ta=document.getElementById("msg-text");
  const text=ta.value.trim();
  if(!text)return;
  ta.value=""; ta.style.height="";
  try{
    const r=await fetch(`/leads/${currentLead.id}/enviar`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({mensaje:text})
    });
    if(!r.ok)throw new Error(await r.text());
    await loadMessages(); toast("✉ Enviado");
  }catch(e){ta.value=text; toast("⚠ "+e.message)}
}

function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg()}}
function autoResize(ta){ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,120)+"px"}

// ── Refresh ────────────────────────────────────────────────
function refreshAll(){
  clearTimeout(refreshTimer);
  loadLeads().finally(()=>{refreshTimer=setTimeout(refreshAll,15000)});
}
async function refreshChat(){await loadMessages();toast("↻ Actualizado")}

// ── PWA / SW ───────────────────────────────────────────────
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault(); deferredPrompt=e;
  setTimeout(()=>toast("💡 Instala esta app desde el menú del navegador",4000),2000);
});
if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(console.error);

// ── Init ───────────────────────────────────────────────────
refreshAll();
</script>
